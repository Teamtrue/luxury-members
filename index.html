<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PlutusClub — Membership Signup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #0A0A12;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, system-ui, sans-serif;
    }
    #root {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .phone-frame {
      width: 390px; height: 844px;
      border-radius: 44px; overflow: hidden;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      body { background: #FBF8F1; }
      .phone-frame { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
// ─── DESIGN TOKENS ────────────────────────────────────────────
const PC = {
  obsidian: '#0A0A12', ink: '#15151F', ink2: '#1F1F2B',
  gold: '#C9A961', goldHi: '#E2C77A', goldDeep: '#8E7333',
  cream: '#F6F2E8', paper: '#FBF8F1',
  mute: '#7A7787', muteDk: '#9A95A7',
  line: '#E8E2D2', lineDk: 'rgba(255,255,255,0.08)',
};
const SERIF = '"Cormorant Garamond", "Playfair Display", Georgia, serif';
const SANS  = '-apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif';

if (!document.getElementById('pc-fonts')) {
  const l = document.createElement('link');
  l.rel = 'stylesheet'; l.id = 'pc-fonts';
  l.href = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap';
  document.head.appendChild(l);
}

// ─── SHARED PRIMITIVES ────────────────────────────────────────

function PrimaryBtn({ children, dark=false, gold=false, disabled=false, onClick, style={} }) {
  const bg = gold ? PC.gold : dark ? PC.cream : PC.obsidian;
  const fg = gold ? PC.obsidian : dark ? PC.obsidian : PC.cream;
  return (
    <div onClick={disabled ? undefined : onClick} style={{
      height: 56, borderRadius: 4, background: bg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: fg, fontWeight: 600, fontSize: 13, letterSpacing: 2,
      fontFamily: SANS, textTransform: 'uppercase',
      cursor: disabled ? 'default' : 'pointer',
      opacity: disabled ? 0.4 : 1,
      userSelect: 'none', transition: 'opacity .15s',
      ...style,
    }}>{children}</div>
  );
}

function GhostBtn({ children, dark=false, onClick, style={} }) {
  return (
    <div onClick={onClick} style={{
      height: 56, borderRadius: 4, background: 'transparent',
      border: `1px solid ${dark ? PC.lineDk : PC.line}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: dark ? PC.cream : PC.obsidian,
      fontSize: 13, fontWeight: 600, letterSpacing: 2,
      fontFamily: SANS, textTransform: 'uppercase',
      cursor: 'pointer', userSelect: 'none',
      ...style,
    }}>{children}</div>
  );
}

function Progress({ step, total=6, dark=false }) {
  return (
    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          height: 2,
          width: i === step ? 20 : 10,
          background: i <= step ? PC.gold : dark ? PC.lineDk : PC.line,
          borderRadius: 1, transition: 'all .25s ease',
        }}/>
      ))}
    </div>
  );
}

function BackChip({ dark=false, onClick }) {
  return (
    <div onClick={onClick} style={{
      width: 36, height: 36, borderRadius: 18,
      background: dark ? 'rgba(255,255,255,0.06)' : 'rgba(10,10,18,0.05)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      cursor: 'pointer', userSelect: 'none',
    }}>
      <svg width="10" height="16" viewBox="0 0 10 16">
        <path d="M8 1L2 8l6 7" stroke={dark ? PC.cream : PC.obsidian} strokeWidth="1.4" fill="none" strokeLinecap="round"/>
      </svg>
    </div>
  );
}

function TopBar({ step, total=6, dark=false, onBack }) {
  return (
    <div style={{ padding: '12px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <BackChip dark={dark} onClick={onBack}/>
      <Progress step={step} total={total} dark={dark}/>
      <div style={{ width: 36 }}/>
    </div>
  );
}

function ScreenShell({ children, bg=PC.paper, dark=false }) {
  return (
    <div style={{
      width: '100%', height: '100%', background: bg,
      display: 'flex', flexDirection: 'column',
      fontFamily: SANS, color: dark ? PC.cream : PC.obsidian,
      overflowY: 'hidden',
    }}>{children}</div>
  );
}

function Eyebrow({ children, color, style={} }) {
  return (
    <div style={{
      fontSize: 10, fontWeight: 600, letterSpacing: 2.5,
      textTransform: 'uppercase', color: color || PC.gold,
      fontFamily: SANS, ...style,
    }}>{children}</div>
  );
}

function Display({ children, dark=false, style={} }) {
  return (
    <h1 style={{
      fontFamily: SERIF, fontWeight: 500, fontSize: 38,
      lineHeight: 1.08, letterSpacing: -0.5, margin: 0,
      color: dark ? PC.cream : PC.obsidian, ...style,
    }}>{children}</h1>
  );
}

function Ornament({ size=8, color=PC.gold }) {
  return (
    <svg width={size} height={size} viewBox="0 0 8 8" style={{ flexShrink: 0 }}>
      <path d="M4 0 L4.7 3.3 L8 4 L4.7 4.7 L4 8 L3.3 4.7 L0 4 L3.3 3.3 Z" fill={color}/>
    </svg>
  );
}

function Hairline({ dark=false, ornament=false, style={} }) {
  const c = dark ? PC.gold : PC.goldDeep;
  if (ornament) return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, ...style }}>
      <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, transparent, ${c}88, ${c})` }}/>
      <Ornament color={c} size={7}/>
      <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, ${c}, ${c}88, transparent)` }}/>
    </div>
  );
  return (
    <div style={{
      height: 1,
      background: `linear-gradient(90deg, transparent, ${c}55 20%, ${c}55 80%, transparent)`,
      ...style,
    }}/>
  );
}

function StepHead({ step, title, kicker, dark=false }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <Eyebrow color={dark ? PC.gold : PC.goldDeep}>Step {step}</Eyebrow>
        <div style={{ flex: 1, height: 1, background: dark ? PC.lineDk : `${PC.goldDeep}33` }}/>
        <Eyebrow color={dark ? PC.muteDk : PC.mute} style={{ fontSize: 9 }}>{kicker}</Eyebrow>
      </div>
      <Display dark={dark} style={{ marginTop: 12 }}>{title}</Display>
    </div>
  );
}

function SectionDivider({ label, dark=false, style={} }) {
  const c    = dark ? PC.muteDk : PC.mute;
  const line = dark ? PC.lineDk : `${PC.goldDeep}22`;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, ...style }}>
      <div style={{ flex: 1, height: 1, background: line }}/>
      <div style={{ fontSize: 9, letterSpacing: 2.5, color: c, textTransform: 'uppercase', fontWeight: 500 }}>{label}</div>
      <div style={{ flex: 1, height: 1, background: line }}/>
    </div>
  );
}

function Field({ label, value, filled, focus, caret }) {
  return (
    <div style={{
      height: 64, borderRadius: 4,
      border: `1px solid ${focus ? PC.obsidian : PC.line}`,
      background: '#fff', padding: '10px 16px',
      display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 4,
      position: 'relative',
    }}>
      {focus && (
        <div style={{ position: 'absolute', left: 0, top: 12, bottom: 12, width: 2, background: PC.gold }}/>
      )}
      <div style={{ fontSize: 9, color: focus ? PC.goldDeep : PC.mute, fontWeight: 600, letterSpacing: 2.4, textTransform: 'uppercase' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
        <span style={{ fontSize: 16, fontWeight: 500, color: filled ? PC.obsidian : PC.mute, fontVariantNumeric: 'tabular-nums lining-nums' }}>{value}</span>
        {caret && <div style={{ width: 1.5, height: 18, background: PC.gold, marginLeft: 1, animation: 'blink 1s step-start infinite' }}/>}
      </div>
    </div>
  );
}

// Corner brackets helper  (used on receipt, badge, certificate)
const CORNERS = [[0,0,0],[0,1,90],[1,0,270],[1,1,180]];
function CornerBrackets({ size=10, color=PC.goldDeep, strokeWidth=1 }) {
  return CORNERS.map(([x,y,r],i) => (
    <svg key={i} width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{
      position: 'absolute', [y?'bottom':'top']: -1, [x?'right':'left']: -1,
      transform: `rotate(${r}deg)`,
    }}>
      <path d={`M0 ${size} L0 0 L${size} 0`} stroke={color} strokeWidth={strokeWidth} fill="none"/>
    </svg>
  ));
}

// ─── 1. WELCOME ───────────────────────────────────────────────
function ScreenWelcome({ onNext }) {
  return (
    <ScreenShell bg={PC.obsidian} dark>
      <div style={{ position: 'relative', flex: 1, background: PC.obsidian, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {/* faint gold radial */}
        <div style={{
          position: 'absolute', top: -80, left: '50%', transform: 'translateX(-50%)',
          width: 480, height: 480, borderRadius: '50%',
          background: `radial-gradient(circle, ${PC.gold}22 0%, transparent 60%)`,
          pointerEvents: 'none',
        }}/>
        {/* faint 1px frame */}
        <div style={{
          position: 'absolute', top: 96, left: 24, right: 24, bottom: 24,
          border: `1px solid ${PC.lineDk}`, pointerEvents: 'none',
        }}/>

        {/* Logo */}
        <div style={{ padding: '76px 24px 0', textAlign: 'center' }}>
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style={{ display: 'block', margin: '0 auto' }}>
            <circle cx="20" cy="20" r="18.5" stroke={PC.gold} strokeWidth="1"/>
            <circle cx="20" cy="20" r="14"   stroke={PC.gold} strokeWidth="0.5" strokeOpacity="0.4"/>
            <text x="20" y="27" textAnchor="middle" fontFamily={SERIF} fontSize="20" fontWeight="600" fill={PC.gold} letterSpacing="-1">P</text>
          </svg>
          <div style={{ marginTop: 14, fontSize: 11, letterSpacing: 4, color: PC.gold, textTransform: 'uppercase' }}>PlutusClub</div>
          <div style={{ marginTop: 2,  fontSize: 9,  letterSpacing: 3, color: PC.muteDk, textTransform: 'uppercase' }}>Est. MMXXVI · Private Membership</div>
        </div>

        {/* Manifesto */}
        <div style={{ padding: '64px 36px 0', textAlign: 'center', position: 'relative' }}>
          <Eyebrow color={PC.gold}>— The Founding Manifesto —</Eyebrow>
          <h1 style={{ marginTop: 18, fontFamily: SERIF, fontWeight: 400, fontSize: 34, lineHeight: 1.15, letterSpacing: -0.3, color: PC.cream }}>
            The price you pay<br/>is not the price<br/>you <em style={{ color: PC.gold, fontStyle: 'italic' }}>deserve.</em>
          </h1>
          <p style={{ marginTop: 22, fontSize: 13, lineHeight: 1.65, color: PC.muteDk, fontFamily: SANS, maxWidth: 280, margin: '22px auto 0' }}>
            A private buying club. The institutional pricing once reserved for armies, corporations, and the well-connected — now open to you.
          </p>
        </div>

        {/* Stats strip */}
        <div style={{ marginTop: 'auto', marginBottom: 24, padding: '0 24px' }}>
          {/* top hairline + ornament */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
            <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, transparent, ${PC.gold}88, ${PC.gold})` }}/>
            <Ornament size={8} color={PC.gold}/>
            <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, ${PC.gold}, ${PC.gold}88, transparent)` }}/>
          </div>
          <div style={{ display: 'flex', alignItems: 'stretch' }}>
            {[['60','Categories'],['10 K+','Private Members'],['18–40%','Avg. Savings']].map(([n,l],i) => (
              <React.Fragment key={l}>
                {i > 0 && <div style={{ width: 1, background: `linear-gradient(180deg, transparent, ${PC.gold}66 30%, ${PC.gold}66 70%, transparent)` }}/>}
                <div style={{ flex: 1, textAlign: 'center', padding: '4px 4px 2px' }}>
                  <div style={{ fontFamily: SERIF, fontSize: 32, lineHeight: 1, color: PC.gold, fontWeight: 500, letterSpacing: -0.5, fontVariantNumeric: 'tabular-nums lining-nums' }}>{n}</div>
                  <div style={{ marginTop: 9, fontSize: 8, letterSpacing: 2.2, color: PC.cream, textTransform: 'uppercase', fontWeight: 500, fontFamily: SANS }}>{l}</div>
                </div>
              </React.Fragment>
            ))}
          </div>
          {/* bottom hairline */}
          <div style={{ marginTop: 14, height: 1, background: `linear-gradient(90deg, transparent, ${PC.gold}55 20%, ${PC.gold}55 80%, transparent)` }}/>
          <div style={{ marginTop: 10, textAlign: 'center', fontSize: 7.5, letterSpacing: 3, color: PC.muteDk, textTransform: 'uppercase', fontFamily: SANS }}>
            Crafted in India · Member Owned
          </div>
        </div>
      </div>

      {/* CTAs */}
      <div style={{ padding: '0 24px 36px', background: PC.obsidian, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <PrimaryBtn gold onClick={onNext}>Request Membership</PrimaryBtn>
        <div style={{ textAlign: 'center', padding: '12px 0', fontSize: 12, color: PC.muteDk, letterSpacing: 1.5, textTransform: 'uppercase', cursor: 'pointer' }}>
          Already a member? <span style={{ color: PC.gold, fontWeight: 600 }}>Sign in</span>
        </div>
      </div>
    </ScreenShell>
  );
}

// ─── 2. PHONE ─────────────────────────────────────────────────
function ScreenPhone({ onNext, onBack }) {
  return (
    <ScreenShell bg={PC.paper}>
      <TopBar step={0} onBack={onBack}/>
      <div style={{ padding: '24px 24px 0', flex: 1, overflowY: 'auto' }}>
        <StepHead step="01" kicker="Identity" title={<>What's your<br/>number?</>}/>
        <p style={{ marginTop: 16, fontSize: 14, color: PC.mute, lineHeight: 1.55, maxWidth: 300 }}>
          We'll send a one-time code to confirm. Your number is never shared with brands.
        </p>

        {/* Phone row */}
        <div style={{ marginTop: 34, display: 'flex', gap: 10 }}>
          {/* Country chip */}
          <div style={{ height: 60, borderRadius: 4, border: `1px solid ${PC.line}`, display: 'flex', alignItems: 'center', padding: '0 14px', gap: 8, background: '#fff', cursor: 'pointer', userSelect: 'none' }}>
            <div style={{ width: 22, height: 14, borderRadius: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
              <div style={{ flex: 1, background: '#FF9933' }}/>
              <div style={{ flex: 1, background: '#fff', position: 'relative' }}>
                <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ width: 4, height: 4, borderRadius: 2, background: '#000088' }}/>
                </div>
              </div>
              <div style={{ flex: 1, background: '#138808' }}/>
            </div>
            <span style={{ fontSize: 15, fontWeight: 500 }}>+91</span>
            <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke={PC.mute} strokeWidth="1.4" fill="none" strokeLinecap="round"/></svg>
          </div>
          {/* Number field */}
          <div style={{ flex: 1, height: 60, borderRadius: 4, border: `1px solid ${PC.obsidian}`, display: 'flex', alignItems: 'center', padding: '0 16px', background: '#fff' }}>
            <span style={{ fontSize: 18, fontWeight: 500, letterSpacing: 1, fontVariantNumeric: 'tabular-nums', flex: 1 }}>98765 43210</span>
            <div style={{ width: 1.5, height: 22, background: PC.gold, animation: 'blink 1s step-start infinite' }}/>
          </div>
        </div>

        {/* Trust pill */}
        <div style={{ marginTop: 26, padding: '14px 16px', background: PC.paper, border: `1px solid ${PC.line}`, borderRadius: 4, display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ width: 22, height: 22, borderRadius: 11, background: PC.obsidian, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>
            <svg width="10" height="12" viewBox="0 0 10 12">
              <path d="M5 1L2 4v3c0 2 1.5 3.5 3 4 1.5-.5 3-2 3-4V4L5 1z" stroke={PC.gold} strokeWidth="1.2" fill="none" strokeLinejoin="round"/>
            </svg>
          </div>
          <div style={{ fontSize: 12, color: PC.mute, lineHeight: 1.55 }}>
            <strong style={{ color: PC.obsidian, fontWeight: 600 }}>The member is never the product.</strong> Your data is never sold to brands.
          </div>
        </div>

        <p style={{ marginTop: 22, fontSize: 11, color: PC.mute, lineHeight: 1.6 }}>
          By continuing you agree to the PlutusClub{' '}
          <span style={{ color: PC.obsidian, fontWeight: 600, textDecoration: 'underline', textDecorationColor: PC.line, cursor: 'pointer' }}>Member Charter</span>
          {' '}and{' '}
          <span style={{ color: PC.obsidian, fontWeight: 600, textDecoration: 'underline', textDecorationColor: PC.line, cursor: 'pointer' }}>Privacy Policy</span>.
        </p>
      </div>
      <div style={{ padding: '16px 24px 24px' }}>
        <PrimaryBtn onClick={onNext}>Send Code</PrimaryBtn>
      </div>
    </ScreenShell>
  );
}

// ─── 3. OTP ───────────────────────────────────────────────────
function ScreenOTP({ onNext, onBack }) {
  const digits = ['8','4','2','1','',''];
  return (
    <ScreenShell bg={PC.paper}>
      <TopBar step={1} onBack={onBack}/>
      <div style={{ padding: '24px 24px 0', flex: 1, overflowY: 'auto' }}>
        <StepHead step="02" kicker="Verification" title={<>Enter the<br/>six-digit code.</>}/>
        <p style={{ marginTop: 16, fontSize: 14, color: PC.mute, lineHeight: 1.55 }}>
          Sent via SMS to <span style={{ color: PC.obsidian, fontWeight: 600 }}>+91 98765 43210</span>.{' '}
          <span style={{ color: PC.goldDeep, fontWeight: 600, borderBottom: `1px solid ${PC.gold}`, cursor: 'pointer' }}>Change</span>
        </p>

        <div style={{ marginTop: 34, display: 'flex', gap: 6, justifyContent: 'space-between' }}>
          {digits.map((d,i) => {
            const isFilled = d !== '';
            const isActive = i === digits.findIndex(x => x === '');
            return (
              <div key={i} style={{
                width: 44, height: 64, borderRadius: 4,
                border: `1px solid ${isFilled || isActive ? PC.obsidian : PC.line}`,
                background: '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: SERIF, fontSize: 30, fontWeight: 500, color: PC.obsidian,
                position: 'relative',
                boxShadow: isActive ? `inset 0 0 0 1px ${PC.obsidian}` : 'none',
                fontVariantNumeric: 'lining-nums tabular-nums',
              }}>
                {d}
                {isActive && <div style={{ width: 1.5, height: 28, background: PC.gold, position: 'absolute', animation: 'blink 1s step-start infinite' }}/>}
              </div>
            );
          })}
        </div>

        {/* Resend card */}
        <div style={{ marginTop: 32, padding: 16, background: '#fff', border: `1px solid ${PC.line}`, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: 1.5, color: PC.mute, textTransform: 'uppercase' }}>Resend in</div>
            <div style={{ fontFamily: SERIF, fontSize: 22, color: PC.obsidian, marginTop: 2 }}>0 : 24</div>
          </div>
          <div style={{ fontSize: 12, color: PC.mute, letterSpacing: 1.2, textTransform: 'uppercase', cursor: 'pointer' }}>
            Didn't receive it? <span style={{ color: PC.goldDeep, fontWeight: 600 }}>Call instead</span>
          </div>
        </div>
      </div>
      <div style={{ padding: '16px 24px 24px' }}>
        <PrimaryBtn onClick={onNext} style={{ opacity: 0.4 }}>Verify</PrimaryBtn>
      </div>
    </ScreenShell>
  );
}

// ─── 4. PROFILE ───────────────────────────────────────────────
function ScreenName({ onNext, onBack }) {
  return (
    <ScreenShell bg={PC.paper}>
      <TopBar step={2} onBack={onBack}/>
      <div style={{ padding: '24px 24px 0', flex: 1, overflowY: 'auto' }}>
        <StepHead step="03" kicker="The Member" title={<>Tell us<br/>about you.</>}/>
        <p style={{ marginTop: 16, fontSize: 14, color: PC.mute, lineHeight: 1.55 }}>
          Your name appears on every invoice, ID-verification, and member certificate.
        </p>

        <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 12 }}>
          <Field label="Full Name" value="Aarav Mehta" filled/>
          <Field label="Email" value="aarav.mehta@" filled focus caret/>
          <Field label="City" value="Mumbai · MH" filled/>
        </div>

        {/* Founding cohort badge */}
        <div style={{ marginTop: 22, padding: '14px 16px', background: PC.obsidian, color: PC.cream, borderRadius: 4, display: 'flex', alignItems: 'center', gap: 14, position: 'relative', overflow: 'hidden' }}>
          <svg width="10" height="10" viewBox="0 0 10 10" style={{ position: 'absolute', top: -1, left: -1 }}>
            <path d="M0 10 L0 0 L10 0" stroke={PC.gold} strokeWidth="1" fill="none"/>
          </svg>
          <svg width="10" height="10" viewBox="0 0 10 10" style={{ position: 'absolute', bottom: -1, right: -1, transform: 'rotate(180deg)' }}>
            <path d="M0 10 L0 0 L10 0" stroke={PC.gold} strokeWidth="1" fill="none"/>
          </svg>
          <div style={{ width: 38, height: 38, borderRadius: 19, border: `1px solid ${PC.gold}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Ornament size={12}/>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 9, letterSpacing: 2.5, color: PC.gold, textTransform: 'uppercase', fontWeight: 600 }}>Founding Cohort</div>
            <div style={{ fontSize: 13, marginTop: 4, color: PC.cream, letterSpacing: 0.1 }}>
              Member{' '}
              <span style={{ fontFamily: SERIF, fontSize: 17, color: PC.gold, fontVariantNumeric: 'tabular-nums lining-nums' }}>#01,247</span>
              {' '}of{' '}

// ─── APP ──────────────────────────────────────────────────────
function App() {
  const [step, setStep] = React.useState(0);
  const [tier, setTier] = React.useState('platinum');
  const [categories, setCategories] = React.useState(
    new Set(['automobiles','health-insurance','international-holidays','investments-sips'])
  );
  const [paymentMethod, setPaymentMethod] = React.useState('upi');

  const next = () => setStep(s => Math.min(s + 1, 7));
  const back = () => setStep(s => Math.max(s - 1, 0));
  const toggleCat = (id) => setCategories(prev => {
    const n = new Set(prev);
    n.has(id) ? n.delete(id) : n.add(id);
    return n;
  });

  const screens = [
    <ScreenWelcome    key={0} onNext={next}/>,
    <ScreenPhone      key={1} onNext={next} onBack={back}/>,
    <ScreenOTP        key={2} onNext={next} onBack={back}/>,
    <ScreenName       key={3} onNext={next} onBack={back}/>,
    <ScreenTier       key={4} onNext={next} onBack={back} tier={tier} onSelectTier={setTier}/>,
    <ScreenCategories key={5} onNext={next} onBack={back} categories={categories} onToggle={toggleCat}/>,
    <ScreenPayment    key={6} onNext={next} onBack={back} tier={tier} paymentMethod={paymentMethod} onSelectPayment={setPaymentMethod}/>,
    <ScreenDone       key={7}/>,
  ];

  return (
    <div className="phone-frame">
      {screens[step]}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
