  <style>

    function TopNav() {
      return (

          position: 'sticky',
          top: 0,

          <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
            <a

    function TokenBalanceHero() {
      return (
        <div style={{
          background: PC.ink,
          border: '1px solid rgba(201,169,97,0.3)',
          borderRadius: 20,
          padding: '48px 40px 36px',
          marginBottom: 24,
          position: 'relative',
          overflow: 'hidden',
        }}>
          {/* Radial gold glow backdrop */}
          <div style={{
            position: 'absolute',
            top: '50%',
            left: '50%',
            transform: 'translate(-50%, -50%)',
            width: 560,
            height: 340,
            background: 'radial-gradient(ellipse, rgba(201,169,97,0.10) 0%, transparent 68%)',
            pointerEvents: 'none',
          }} />

          {/* Subtle corner decoration */}
          <div style={{
            position: 'absolute',
            top: 0,
            right: 0,
            width: 200,
            height: 200,
            background: 'radial-gradient(circle at top right, rgba(201,169,97,0.06) 0%, transparent 60%)',
            pointerEvents: 'none',
          }} />

          {/* Top stats */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 36 }}>

            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',

              fontSize: 13,
              fontFamily: SANS,
              color: PC.gold,
              background: 'rgba(201,169,97,0.09)',
              border: '1px solid rgba(201,169,97,0.22)',
              borderRadius: 8,
              padding: '9px 16px',
            }}>

            <button style={{
              background: `linear-gradient(135deg, ${PC.goldDeep}, ${PC.gold})`,
              border: 'none',
              borderRadius: 10,
              padding: '12px 28px',
              fontSize: 14,
              fontWeight: 600,
              color: PC.obsidian,
              fontFamily: SANS,
              cursor: 'pointer',
              letterSpacing: 0.4,
            }}>
              Redeem Tokens
            </button>
          </div>
        </div>
      );
    }

    function HowToEarn() {
      const rows = [
        { tier: 'Silver',   rate: '1%',    example: '₹50,000 → 500 PC',   current: false },
        { tier: 'Gold',     rate: '1.25%', example: '₹50,000 → 625 PC',   current: false },
        { tier: 'Platinum', rate: '1.5%',  example: '₹50,000 → 750 PC ⭐', current: true  },
        { tier: 'Obsidian', rate: '2%',    example: '₹50,000 → 1,000 PC', current: false },
      ];
      return (
        <div style={{
          background: PC.ink2,
          border: `1px solid ${PC.lineDk}`,
          borderRadius: 16,
          padding: '28px 28px 24px',
          flex: 1,
          minWidth: 0,
        }}>
          <div style={{ fontSize: 22, fontFamily: SERIF, color: PC.cream, fontWeight: 600, marginBottom: 20 }}>
            Earning PC Tokens
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 20 }}>
            <thead>
              <tr>
                {['Tier', 'Rate', 'Example (₹50k)'].map(h => (
                  <th key={h} style={{
                    textAlign: 'left',
                    fontSize: 10,
                    fontFamily: SANS,
                    color: PC.mute,

                    textTransform: 'uppercase',
                    paddingBottom: 10,
                    borderBottom: `1px solid ${PC.lineDk}`,
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.tier} style={{ background: r.current ? 'rgba(201,169,97,0.06)' : 'transparent' }}>
                  <td style={{
                    padding: '11px 0',
                    fontSize: 14,
                    fontFamily: SANS,
                    color: r.current ? PC.gold : PC.cream,
                    fontWeight: r.current ? 600 : 400,
                    borderBottom: `1px solid ${PC.lineDk}`,
                  }}>{r.tier}</td>
                  <td style={{
                    padding: '11px 8px',
                    fontSize: 14,
                    fontFamily: SANS,
                    color: r.current ? PC.goldHi : PC.cream,
                    fontWeight: r.current ? 600 : 400,
                    borderBottom: `1px solid ${PC.lineDk}`,
                  }}>{r.rate}</td>
                  <td style={{
                    padding: '11px 0',
                    fontSize: 13,
                    fontFamily: SANS,
                    color: r.current ? PC.goldHi : PC.muteDk,
                    borderBottom: `1px solid ${PC.lineDk}`,
                  }}>{r.example}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ fontSize: 12, color: PC.muteDk, fontFamily: SANS, lineHeight: 1.65, marginBottom: 12 }}>
            Tokens are credited within 7 days of order delivery.
          </div>
          <div style={{
            fontSize: 12,
            color: PC.gold,
            fontFamily: SANS,
            background: 'rgba(201,169,97,0.08)',
            border: '1px solid rgba(201,169,97,0.18)',
            borderRadius: 8,
            padding: '9px 14px',
          }}>
            ✦ Referral bonus: +500 PC for every member you refer

    function HowToRedeem() {
      const tiers = [
        { label: 'Silver / Gold', limit: 'Up to 20% of booking',  you: false },
        { label: 'Platinum',      limit: 'Up to 30% of booking',  you: true  },

      return (
        <div style={{
          background: PC.ink2,
          border: `1px solid ${PC.lineDk}`,
          borderRadius: 16,
          padding: '28px 28px 24px',
          flex: 1,
          minWidth: 0,
        }}>
          <div style={{ fontSize: 22, fontFamily: SERIF, color: PC.cream, fontWeight: 600, marginBottom: 20 }}>
            Redeeming PC Tokens
          </div>

          <div style={{ marginBottom: 22 }}>
            <div style={{ fontSize: 32, fontFamily: SERIF, color: PC.gold, fontWeight: 600, lineHeight: 1, marginBottom: 4 }}>
              1 PC Token = ₹0.50
            </div>
            <div style={{ fontSize: 13, color: PC.muteDk, fontFamily: SANS }}>discount applied at checkout</div>
          </div>

          <div style={{ marginBottom: 20 }}>
            {tiers.map(item => (
              <div key={item.label} style={{
                display: 'flex',

                background: item.you ? 'rgba(201,169,97,0.08)' : 'rgba(255,255,255,0.025)',

              }}>
                <span style={{
                  fontSize: 13,
                  fontFamily: SANS,
                  color: item.you ? PC.gold : PC.muteDk,
                  fontWeight: item.you ? 600 : 400,

                <span style={{ fontSize: 13, fontFamily: SANS, color: item.you ? PC.cream : PC.mute }}>
                  {item.limit}
                </span>

            ))}
          </div>

          <div style={{
            fontSize: 12,
            color: PC.muteDk,
            fontFamily: SANS,
            lineHeight: 1.65,
            padding: '14px 0',
            borderTop: `1px solid ${PC.lineDk}`,
            borderBottom: `1px solid ${PC.lineDk}`,
            marginBottom: 14,
          }}>
            Select "Use PC Tokens" during checkout to apply your balance to any eligible booking.
          </div>

          <div style={{ fontSize: 12, color: PC.muteDk, fontFamily: SANS, lineHeight: 1.7 }}>

    function TypePill({ type }) {
      const cfg = {
        earned:   { bg: 'rgba(34,197,94,0.12)',   color: '#4ADE80', label: 'Earned'   },
        redeemed: { bg: 'rgba(239,68,68,0.12)',    color: '#F87171', label: 'Redeemed' },
        bonus:    { bg: 'rgba(201,169,97,0.16)',   color: PC.gold,   label: 'Bonus'    },
      }[type];
      return (
        <span style={{
          display: 'inline-block',
          padding: '3px 10px',
          borderRadius: 20,
          fontSize: 11,
          fontWeight: 600,
          fontFamily: SANS,
          background: cfg.bg,
          color: cfg.color,
          letterSpacing: 0.4,
          whiteSpace: 'nowrap',
        }}>{cfg.label}</span>
      );
    }

    function TransactionHistory() {
      const [filter, setFilter] = React.useState('all');

      const filtered = filter === 'all' ? TXNS : TXNS.filter(t => t.type === filter);

      const tabs = [
        { key: 'all',      label: 'All'       },
        { key: 'earned',   label: 'Earned'    },
        { key: 'redeemed', label: 'Redeemed'  },
        { key: 'bonus',    label: 'Bonuses'   },
      ];

      return (
        <div style={{
          background: PC.ink,
          border: `1px solid ${PC.lineDk}`,
          borderRadius: 16,
          marginBottom: 24,
          overflow: 'hidden',
        }}>
          {/* Card header */}
          <div style={{
            padding: '24px 28px 0',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            marginBottom: 22,
            flexWrap: 'wrap',
            gap: 12,
          }}>
            <div>
              <div style={{ fontSize: 22, fontFamily: SERIF, color: PC.cream, fontWeight: 600 }}>
                Transaction History
              </div>
              <div style={{ fontSize: 12, color: PC.mute, fontFamily: SANS, marginTop: 3 }}>
                {filtered.length} transaction{filtered.length !== 1 ? 's' : ''}
              </div>
            </div>
            {/* Filter tabs */}
            <div style={{
              display: 'flex',
              gap: 4,
              background: PC.ink2,
              borderRadius: 10,
              padding: 4,
              border: `1px solid ${PC.lineDk}`,
            }}>
              {tabs.map(tab => (
                <button
                  key={tab.key}
                  onClick={() => setFilter(tab.key)}
                  style={{
                    padding: '6px 14px',
                    borderRadius: 7,
                    border: 'none',
                    cursor: 'pointer',
                    fontSize: 12,
                    fontFamily: SANS,
                    fontWeight: 500,
                    background: filter === tab.key ? PC.gold : 'transparent',
                    color: filter === tab.key ? PC.obsidian : PC.muteDk,
                    transition: 'all 0.15s',
                  }}
                >{tab.label}</button>
              ))}
            </div>
          </div>

          {/* Table */}
          <div style={{ padding: '0 28px 8px', overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 560 }}>
              <thead>
                <tr>
                  {['Date', 'Description', 'Type', 'Ref', 'Amount'].map(h => (
                    <th key={h} style={{
                      textAlign: h === 'Amount' ? 'right' : 'left',
                      fontSize: 10,
                      fontFamily: SANS,
                      color: PC.mute,
                      letterSpacing: 1.5,
                      textTransform: 'uppercase',
                      padding: '0 0 12px',
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((t, i) => (
                  <tr key={t.id} style={{ background: i % 2 === 1 ? 'rgba(255,255,255,0.018)' : 'transparent' }}>
                    <td style={{ padding: '13px 12px 13px 0', fontSize: 12, color: PC.muteDk, fontFamily: SANS, whiteSpace: 'nowrap' }}>
                      {t.date}
                    </td>
                    <td style={{ padding: '13px 16px 13px 0', fontSize: 13, color: PC.cream, fontFamily: SANS }}>
                      {t.desc}
                    </td>
                    <td style={{ padding: '13px 16px 13px 0' }}>
                      <TypePill type={t.type} />
                    </td>
                    <td style={{ padding: '13px 16px 13px 0', fontSize: 11, color: PC.mute, fontFamily: SANS, fontVariantNumeric: 'tabular-nums' }}>
                      {t.ref}
                    </td>
                    <td style={{
                      padding: '13px 0',
                      textAlign: 'right',
                      fontSize: 15,
                      fontFamily: SERIF,
                      fontWeight: 600,
                      color: t.amount > 0 ? '#4ADE80' : '#F87171',
                      whiteSpace: 'nowrap',
                    }}>
                      {t.amount > 0 ? '+' : ''}{t.amount.toLocaleString('en-IN')} PC
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filtered.length === 0 && (
              <div style={{ textAlign: 'center', padding: '40px 0', color: PC.mute, fontSize: 14, fontFamily: SANS }}>
                No transactions in this category.
              </div>
            )}
          </div>
          <div style={{ height: 16 }} />
        </div>
      );
    }

          background: PC.ink,
          border: `1px solid ${PC.lineDk}`,

          <div style={{ padding: '24px 28px 20px', borderBottom: `1px solid ${PC.lineDk}` }}>
            <div style={{ fontSize: 22, fontFamily: SERIF, color: PC.cream, fontWeight: 600 }}>
              Tier Comparison
            </div>
            <div style={{ fontSize: 13, color: PC.muteDk, fontFamily: SANS, marginTop: 4 }}>

              <tbody>
                {tiers.map(tier => (

                      fontWeight: tier.current ? 600 : 400,
                      color: tier.current ? PC.gold : PC.cream,
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>
                      {tier.name}
                      {tier.current && (
                        <span style={{
                          marginLeft: 8,
                          fontSize: 10,
                          fontFamily: SANS,
                          color: PC.gold,
                          background: 'rgba(201,169,97,0.16)',
                          padding: '2px 8px',
                          borderRadius: 20,
                          letterSpacing: 1,
                          verticalAlign: 'middle',
                        }}>YOU</span>
                      )}
                    </td>
                    {/* Rate */}
                    <td style={{
                      padding: '15px 0',
                      fontSize: 14,
                      fontFamily: SANS,
                      color: tier.current ? PC.goldHi : PC.cream,
                      fontWeight: tier.current ? 600 : 400,
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>{tier.rate}</td>
                    {/* Max redeem */}
                    <td style={{
                      padding: '15px 0',
                      fontSize: 14,
                      fontFamily: SANS,
                      color: tier.current ? PC.goldHi : PC.cream,
                      fontWeight: tier.current ? 600 : 400,
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>{tier.maxRedeem}</td>
                    {/* Expiry */}
                    <td style={{
                      padding: '15px 0',
                      fontSize: 14,
                      fontFamily: SANS,
                      color: tier.expiry === 'Never' ? '#4ADE80' : PC.muteDk,
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>{tier.expiry}</td>
                    {/* Referral */}
                    <td style={{
                      padding: '15px 0',
                      fontSize: 14,
                      fontFamily: SANS,
                      color: PC.gold,
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>{tier.referral}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div style={{ minHeight: '100vh', background: PC.obsidian }}>
          <TopNav />
          <main style={{ maxWidth: 900, margin: '0 auto', padding: '36px 24px 60px' }}>
            {/* Page heading */}
            <div style={{ marginBottom: 28 }}>
              <h1 style={{ fontSize: 36, fontFamily: SERIF, color: PC.cream, fontWeight: 600, lineHeight: 1.1, marginBottom: 6 }}>
                PC Token Wallet
              </h1>
              <div style={{ fontSize: 14, color: PC.muteDk, fontFamily: SANS }}>
                Aarav Mehta &nbsp;·&nbsp; Platinum Member
              </div>
            </div>

            <TokenBalanceHero />

            {/* Two-column info row */}
            <div style={{ display: 'flex', gap: 20, marginBottom: 24 }}>
              <HowToEarn />
              <HowToRedeem />
            </div>

            <TransactionHistory />

            <TierMultiplierTable />
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
