    function TransactionHistory() {
      const [filter, setFilter] = React.useState('all');

      const filtered = filter === 'all' ? TXNS : TXNS.filter(t => t.type === filter);

      const typeConfig = {
        earned: { label: 'Earned', bg: 'rgba(52,211,153,0.12)', color: '#34D399', textColor: '#34D399' },
        redeemed: { label: 'Redeemed', bg: 'rgba(248,113,113,0.12)', color: '#F87171', textColor: '#F87171' },
        bonus: { label: 'Bonus', bg: 'rgba(201,169,97,0.15)', color: PC.gold, textColor: PC.gold },
      };

      const tabs = [
        { key: 'all', label: 'All' },
        { key: 'earned', label: 'Earned' },
        { key: 'redeemed', label: 'Redeemed' },
        { key: 'bonus', label: 'Bonuses' },
      ];

      return (
        <div style={{
          background: PC.ink,
          border: `1px solid ${PC.lineDk}`,
          borderRadius: 16,
          padding: '28px',
          marginBottom: 24,
        }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 22 }}>
            <div style={{ fontFamily: SERIF, fontSize: 22, fontWeight: 600, color: PC.cream }}>
              Transaction History
            </div>
            <div style={{ fontSize: 12, color: PC.mute, fontFamily: SANS }}>
              {filtered.length} transactions
            </div>
          </div>

          {/* Filter tabs */}
          <div style={{
            display: 'flex',
            gap: 6,
            marginBottom: 20,
            background: 'rgba(255,255,255,0.03)',
            borderRadius: 10,
            padding: 4,
            width: 'fit-content',
          }}>
            {tabs.map(tab => (
              <button
                key={tab.key}
                onClick={() => setFilter(tab.key)}
                style={{
                  border: 'none',
                  borderRadius: 7,
                  padding: '7px 18px',
                  fontSize: 12,
                  fontWeight: filter === tab.key ? 600 : 400,
                  fontFamily: SANS,
                  cursor: 'pointer',
                  transition: 'all 0.2s',
                  background: filter === tab.key ? PC.ink2 : 'transparent',
                  color: filter === tab.key ? PC.cream : PC.mute,
                  letterSpacing: 0.3,
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {/* Table header */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: '2fr 1fr 1fr 1fr',
            padding: '8px 14px',
            marginBottom: 4,
          }}>
            {['Description', 'Date', 'Reference', 'Amount'].map(h => (
              <div key={h} style={{ fontSize: 10, fontFamily: SANS, color: PC.mute, textTransform: 'uppercase', letterSpacing: 1.2, fontWeight: 600, textAlign: h === 'Amount' ? 'right' : 'left' }}>{h}</div>
            ))}
          </div>

          {/* Rows */}
          <div>
            {filtered.map((txn, i) => {
              const cfg = typeConfig[txn.type];
              const isPositive = txn.amount > 0;
              return (
                <div
                  key={txn.id}
                  style={{
                    display: 'grid',
                    gridTemplateColumns: '2fr 1fr 1fr 1fr',
                    padding: '14px 14px',
                    borderRadius: 8,
                    borderBottom: i < filtered.length - 1 ? `1px solid ${PC.lineDk}` : 'none',
                    transition: 'background 0.15s',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.025)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{
                      background: cfg.bg,
                      color: cfg.color,
                      fontSize: 10,
                      fontWeight: 600,
                      letterSpacing: 0.6,
                      textTransform: 'uppercase',
                      borderRadius: 5,
                      padding: '3px 8px',
                      fontFamily: SANS,
                      whiteSpace: 'nowrap',
                    }}>
                      {cfg.label}
                    </span>
                    <span style={{ fontSize: 13, color: PC.cream, fontFamily: SANS }}>{txn.desc}</span>
                  </div>
                  <div style={{ fontSize: 13, color: PC.muteDk, fontFamily: SANS, alignSelf: 'center' }}>{txn.date}</div>
                  <div style={{ fontSize: 11, color: PC.mute, fontFamily: SANS, alignSelf: 'center', fontVariantNumeric: 'tabular-nums' }}>{txn.ref}</div>
                  <div style={{
                    fontSize: 14,
                    fontWeight: 600,
                    fontFamily: SANS,
                    color: isPositive ? '#34D399' : '#F87171',
                    textAlign: 'right',
                    alignSelf: 'center',
                  }}>
                    {isPositive ? '+' : ''}{txn.amount} PC
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

          </div>
          <div style={{ fontSize: 13, color: PC.mute, fontFamily: SANS, marginBottom: 22 }}>
            Your current tier is highlighted. Upgrade to unlock better earning rates and redemption limits.
          </div>

          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'fixed' }}>
              <thead>
                <tr style={{ background: 'rgba(255,255,255,0.03)' }}>
                  {cols.map(col => (
                    <th key={col} style={{
                      textAlign: 'left',
                      padding: '12px 16px',
                      fontSize: 10,
                      fontFamily: SANS,
                      color: PC.mute,
                      textTransform: 'uppercase',
                      letterSpacing: 1.2,
                      fontWeight: 600,
                      borderBottom: `1px solid ${PC.lineDk}`,
                    }}>
                      {col}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {tiers.map((tier, i) => (
                  <tr key={tier.name} style={{
                    background: tier.current ? 'rgba(201,169,97,0.06)' : 'transparent',
                    borderBottom: i < tiers.length - 1 ? `1px solid ${PC.lineDk}` : 'none',
                  }}>
                    <td style={{
                      padding: '16px 16px',
                      borderLeft: tier.current ? `3px solid ${PC.gold}` : '3px solid transparent',
                    }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <span style={{ fontSize: 14, fontFamily: SANS, fontWeight: tier.current ? 700 : 500, color: tier.current ? PC.gold : PC.cream }}>
                          {tier.name}
                        </span>
                        {tier.current && (
                          <span style={{
                            fontSize: 10,
                            background: 'rgba(201,169,97,0.15)',
                            color: PC.gold,
                            borderRadius: 4,
                            padding: '2px 6px',
                            letterSpacing: 0.5,
                            fontFamily: SANS,
                            fontWeight: 600,
                          }}>
                            Current
                          </span>
                        )}
                      </div>
                    </td>
                    <td style={{ padding: '16px 16px', fontSize: 14, fontFamily: SANS, color: tier.current ? PC.goldHi : PC.cream, fontWeight: tier.current ? 600 : 400 }}>
                      {tier.earnRate}
                    </td>
                    <td style={{ padding: '16px 16px', fontSize: 14, fontFamily: SANS, color: tier.current ? PC.goldHi : PC.cream, fontWeight: tier.current ? 600 : 400 }}>
                      {tier.maxRedeem}
                    </td>
                    <td style={{ padding: '16px 16px', fontSize: 14, fontFamily: SANS, color: tier.current ? PC.goldHi : PC.cream, fontWeight: tier.current ? 600 : 400 }}>
                      {tier.expiry}
                    </td>
                    <td style={{ padding: '16px 16px', fontSize: 14, fontFamily: SANS, color: tier.current ? PC.goldHi : PC.cream, fontWeight: tier.current ? 600 : 400 }}>
                      {tier.referral}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function PageHeader() {
      return (
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke={PC.gold} strokeWidth="1.5"/>
              <text x="12" y="17" textAnchor="middle" fontFamily={SERIF} fontSize="14" fontWeight="600" fill={PC.gold}>P</text>
            </svg>
            <h1 style={{ fontFamily: SERIF, fontSize: 32, fontWeight: 600, color: PC.cream, letterSpacing: 0.5 }}>
              Token Wallet
            </h1>
          </div>
          <p style={{ fontSize: 14, color: PC.mute, fontFamily: SANS, marginLeft: 32 }}>
            Aarav Mehta — Platinum Member
          </p>
        </div>
      );
    }

    function App() {
      return (
        <div style={{ minHeight: '100vh', background: PC.obsidian }}>
          <TopNav />
          <div style={{
            maxWidth: 900,
            margin: '0 auto',
            padding: '40px 24px',
          }}>
            <PageHeader />
            <TokenBalanceHero />

            {/* Two column cards */}
            <div style={{ display: 'flex', gap: 20, marginBottom: 24, flexWrap: 'wrap' }}>
              <EarnCard />
              <RedeemCard />
            </div>

            <TransactionHistory />
            <TierTable />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
