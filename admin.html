// ─── HELPERS ──────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('en-IN'); }
function fmtDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

function TierBadge({ tier }) {
  const m = TIER_META[tier] || TIER_META.silver;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 8px', borderRadius:3, background:m.bg, border:`1px solid ${m.color}33` }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:m.color, flexShrink:0 }}/>
      <span style={{ fontSize:11, fontWeight:600, color:m.text, letterSpacing:0.8, textTransform:'uppercase', fontFamily:SANS }}>{m.label}</span>
    </span>
  );
}
function StatusBadge({ status }) {
  const m = STATUS_META[status] || STATUS_META.active;
  return (
    <span style={{ padding:'3px 8px', borderRadius:3, background:m.bg, fontSize:11, fontWeight:600, color:m.text, letterSpacing:0.8, textTransform:'uppercase', fontFamily:SANS }}>{m.label}</span>
  );
}
function BookingStatusBadge({ status }) {
  const map = { confirmed:{bg:'#E8F5EE',text:'#1F6B42'}, active:{bg:'#EAF2FE',text:'#1A5DAB'}, upcoming:{bg:'#FEF2E0',text:'#92510C'}, cancelled:{bg:'#F0EFF2',text:PC.mute} };
  const m = map[status] || map.confirmed;
  return <span style={{ padding:'2px 7px', borderRadius:3, background:m.bg, fontSize:10, fontWeight:600, color:m.text, letterSpacing:0.8, textTransform:'uppercase' }}>{status}</span>;
}

function Avatar({ name, tier, size=36 }) {
  const m = TIER_META[tier] || TIER_META.silver;
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:`${m.color}22`, border:`1px solid ${m.color}55`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      <span style={{ fontFamily:SERIF, fontSize:size*0.38, fontWeight:500, color:m.color, lineHeight:1 }}>{initials(name)}</span>
    </div>
  );
}

function Hairline({ style={} }) {
  return <div style={{ height:1, background:`linear-gradient(90deg, transparent, ${PC.goldDeep}33 20%, ${PC.goldDeep}33 80%, transparent)`, ...style }}/>;
}

  const premium    = members.filter(m => m.tier === 'platinum' || m.tier === 'obsidian').length;
  const totalTokens= members.reduce((s,m) => s + m.tokens, 0);
  const stats = [
    { label:'Total Members', value: members.length, serif:true },
    { label:'Active',        value: active,          serif:true },
    { label:'Platinum+',     value: premium,         serif:true },
    { label:'Total PC Tokens', value: fmt(totalTokens), serif:true, small:true },
  ];
  return (
    <div style={{ display:'flex', gap:1, borderBottom:`1px solid ${PC.line}`, background:PC.paper }}>
      {stats.map((s,i) => (
        <div key={s.label} style={{ flex:1, padding:'20px 24px', borderRight: i < stats.length-1 ? `1px solid ${PC.line}` : 'none' }}>
          <div style={{ fontSize:9, letterSpacing:2.5, color:PC.mute, textTransform:'uppercase', fontWeight:600 }}>{s.label}</div>
          <div style={{ marginTop:8, fontFamily:SERIF, fontSize: s.small ? 28 : 36, fontWeight:500, color:PC.obsidian, lineHeight:1, letterSpacing:-0.5, fontVariantNumeric:'tabular-nums lining-nums' }}>{s.value}</div>
        </div>
      ))}
    </div>
  );
}

// ─── SEARCH + FILTERS ─────────────────────────────────────────
function SearchBar({ query, onQuery, tierFilter, onTier, statusFilter, onStatus }) {
  const tiers = ['all','silver','gold','platinum','obsidian'];
  return (
    <div style={{ padding:'16px 24px', borderBottom:`1px solid ${PC.line}`, background:'#fff', display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
      {/* Search input */}
      <div style={{ position:'relative', flex:'1 1 220px', minWidth:180 }}>
        <svg width="14" height="14" viewBox="0 0 24 24" style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
          <path d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z" stroke={PC.mute} strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        </svg>
        <input
          value={query} onChange={e => onQuery(e.target.value)}
          placeholder="Search by name, ID, or email…"
          style={{ width:'100%', height:36, paddingLeft:34, paddingRight:12, borderRadius:4, border:`1px solid ${PC.line}`, background:PC.paper, fontSize:13, color:PC.obsidian, fontFamily:SANS }}
        />
        {query && (
          <div onClick={() => onQuery('')} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', cursor:'pointer', color:PC.mute, fontSize:16, lineHeight:1 }}>×</div>
        )}
      </div>

      {/* Tier filter */}
      <div style={{ display:'flex', gap:4 }}>
        {tiers.map(t => {
          const isActive = tierFilter === t;
          const m = t !== 'all' ? TIER_META[t] : null;
          return (
            <div key={t} onClick={() => onTier(t)} style={{
              height:32, padding:'0 12px', borderRadius:4,
              border: `1px solid ${isActive ? (m ? m.color : PC.obsidian) : PC.line}`,
              background: isActive ? (m ? `${m.color}18` : `${PC.obsidian}08`) : '#fff',
              display:'flex', alignItems:'center', gap:5,
              fontSize:11, fontWeight:600, letterSpacing:0.8, textTransform:'uppercase',
              color: isActive ? (m ? m.text : PC.obsidian) : PC.mute,
              cursor:'pointer', userSelect:'none', transition:'all .15s',
            }}>
              {m && <span style={{ width:5, height:5, borderRadius:'50%', background:m.color, flexShrink:0 }}/>}
              {t === 'all' ? 'All Tiers' : m.label}
            </div>
          );
        })}
      </div>

      {/* Status filter */}
      <div style={{ display:'flex', gap:4 }}>
        {['all','active','suspended','expired'].map(s => {
          const isActive = statusFilter === s;
          const m = s !== 'all' ? STATUS_META[s] : null;
          return (
            <div key={s} onClick={() => onStatus(s)} style={{
              height:32, padding:'0 10px', borderRadius:4,
              border:`1px solid ${isActive ? (m ? m.text + '44' : PC.obsidian) : PC.line}`,
              background: isActive ? (m ? m.bg : `${PC.obsidian}08`) : '#fff',
              fontSize:11, fontWeight:600, letterSpacing:0.8, textTransform:'uppercase',
              color: isActive ? (m ? m.text : PC.obsidian) : PC.mute,
              cursor:'pointer', userSelect:'none', transition:'all .15s',
              display:'flex', alignItems:'center',
            }}>
              {s === 'all' ? 'All Statuses' : m.label}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MEMBERS TABLE ────────────────────────────────────────────
const COLS = [
  { key:'name',   label:'Member',     w:'auto'  },
  { key:'id',     label:'ID',         w:110     },
  { key:'tier',   label:'Tier',       w:120     },
  { key:'tokens', label:'PC Tokens',  w:120     },
  { key:'status', label:'Status',     w:110     },
  { key:'joined', label:'Joined',     w:110     },
  { key:'city',   label:'City',       w:110     },
];

function MembersTable({ members, selected, onSelect, sortBy, sortDir, onSort }) {
  return (
    <div style={{ flex:1, overflowY:'auto' }}>
      {/* Table head */}
      <div style={{ display:'flex', padding:'0 24px', borderBottom:`1px solid ${PC.line}`, background:'#fff', position:'sticky', top:0, zIndex:10 }}>
        {COLS.map(col => (
          <div key={col.key} onClick={() => onSort(col.key)} style={{
            flex: col.w === 'auto' ? 1 : `0 0 ${col.w}px`,
            padding:'10px 0 10px', paddingRight:16,
            fontSize:9.5, fontWeight:600, letterSpacing:2, textTransform:'uppercase',
            color: sortBy === col.key ? PC.goldDeep : PC.mute,
            cursor:'pointer', userSelect:'none', display:'flex', alignItems:'center', gap:4,
          }}>
            {col.label}
            {sortBy === col.key && (
              <svg width="8" height="8" viewBox="0 0 8 8" style={{ transform: sortDir==='asc' ? 'none' : 'rotate(180deg)', transition:'transform .15s' }}>
                <path d="M4 1L7 6H1L4 1Z" fill={PC.goldDeep}/>
              </svg>
            )}
          </div>
        ))}
        <div style={{ width:48 }}/>
      </div>

      {/* Rows */}
      {members.length === 0 ? (
        <div style={{ padding:'60px 24px', textAlign:'center', color:PC.mute, fontSize:14 }}>No members match your search.</div>
      ) : (
        members.map(m => {
          const isSelected = selected?.id === m.id;
          return (
            <div key={m.id} onClick={() => onSelect(isSelected ? null : m)} style={{
              display:'flex', alignItems:'center', padding:'0 24px',
              borderBottom:`1px solid ${PC.line}`,
              background: isSelected ? `${PC.gold}0A` : '#fff',
              cursor:'pointer', transition:'background .1s',
              borderLeft: isSelected ? `3px solid ${PC.gold}` : '3px solid transparent',
            }}
              onMouseEnter={e => { if (!isSelected) e.currentTarget.style.background = PC.paper; }}
              onMouseLeave={e => { if (!isSelected) e.currentTarget.style.background = '#fff'; }}
            >
              {/* Member name + avatar */}
              <div style={{ flex:1, display:'flex', alignItems:'center', gap:12, padding:'14px 16px 14px 0' }}>
                <Avatar name={m.name} tier={m.tier} size={34}/>
                <div>
                  <div style={{ fontSize:14, fontWeight:600, color:PC.obsidian, letterSpacing:-0.1 }}>{m.name}</div>
                  <div style={{ fontSize:11, color:PC.mute, marginTop:1 }}>{m.email}</div>
                </div>
              </div>
              {/* ID */}
              <div style={{ flex:`0 0 110px`, paddingRight:16 }}>
                <span style={{ fontFamily:SERIF, fontSize:13, color:PC.goldDeep, letterSpacing:0.5, fontVariantNumeric:'tabular-nums lining-nums' }}>{m.id}</span>
              </div>
              {/* Tier */}
              <div style={{ flex:`0 0 120px`, paddingRight:16 }}><TierBadge tier={m.tier}/></div>
              {/* Tokens */}
              <div style={{ flex:`0 0 120px`, paddingRight:16 }}>
                <span style={{ fontFamily:SERIF, fontSize:15, fontWeight:500, color:PC.obsidian, fontVariantNumeric:'tabular-nums lining-nums' }}>{fmt(m.tokens)}</span>
                <span style={{ fontSize:10, color:PC.mute, marginLeft:3 }}>PC</span>
              </div>
              {/* Status */}
              <div style={{ flex:`0 0 110px`, paddingRight:16 }}><StatusBadge status={m.status}/></div>
              {/* Joined */}
              <div style={{ flex:`0 0 110px`, paddingRight:16, fontSize:12, color:PC.mute }}>{fmtDate(m.joined)}</div>
              {/* City */}
              <div style={{ flex:`0 0 110px`, paddingRight:16, fontSize:12, color:PC.mute }}>{m.city}</div>
              {/* Chevron */}
              <div style={{ width:48, display:'flex', justifyContent:'flex-end' }}>
                <svg width="14" height="14" viewBox="0 0 24 24">
                  <path d="M9 18l6-6-6-6" stroke={isSelected ? PC.gold : PC.line} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// ─── MEMBER DETAIL PANEL ──────────────────────────────────────
function MemberDetail({ member, onClose }) {
  const [tab, setTab] = React.useState('overview');
  if (!member) return null;
  const tierM = TIER_META[member.tier] || TIER_META.silver;
  const totalBookings = member.bookings.length;
  const totalSavings  = member.bookings.reduce((s,b) => {
    const n = parseInt(b.savings.replace(/[^0-9]/g,''), 10) || 0;
    return s + n;
  }, 0);

  return (
    <div style={{ width:400, flexShrink:0, background:'#fff', borderLeft:`1px solid ${PC.line}`, display:'flex', flexDirection:'column', overflowY:'hidden', animation:'slideIn .2s ease-out' }}>
      {/* Header */}
      <div style={{ padding:'20px 20px 0', borderBottom:`1px solid ${PC.line}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div style={{ display:'flex', gap:14, alignItems:'center' }}>
            <Avatar name={member.name} tier={member.tier} size={48}/>
            <div>
              <div style={{ fontSize:17, fontWeight:600, color:PC.obsidian, letterSpacing:-0.2 }}>{member.name}</div>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4 }}>
                <span style={{ fontFamily:SERIF, fontSize:12, color:PC.goldDeep, letterSpacing:0.5 }}>{member.id}</span>
                <span style={{ width:3, height:3, borderRadius:'50%', background:PC.line }}/>
                <TierBadge tier={member.tier}/>
              </div>
            </div>
          </div>
          <div onClick={onClose} style={{ width:28, height:28, borderRadius:14, background:PC.paper, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1L1 9" stroke={PC.mute} strokeWidth="1.4" strokeLinecap="round"/></svg>
          </div>
        </div>

        {/* Status + actions */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:14, paddingBottom:14 }}>
          <StatusBadge status={member.status}/>
          <div style={{ display:'flex', gap:6 }}>
            {member.status === 'suspended' ? (
              <ActionBtn label="Reinstate" color="#1F6B42" bg="#E8F5EE"/>
            ) : member.status === 'active' ? (
              <ActionBtn label="Suspend" color="#92510C" bg="#FEF2E0"/>
            ) : null}
            <ActionBtn label="Edit" color={PC.obsidian} bg={PC.paper}/>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display:'flex', gap:0, marginTop:4 }}>
          {['overview','bookings'].map(t => (
            <div key={t} onClick={() => setTab(t)} style={{
              padding:'10px 16px', fontSize:12, fontWeight:600, letterSpacing:0.8,
              textTransform:'uppercase', cursor:'pointer', userSelect:'none',
              color: tab === t ? PC.obsidian : PC.mute,
              borderBottom: tab === t ? `2px solid ${PC.gold}` : '2px solid transparent',
              transition:'color .15s, border-color .15s',
            }}>{t}</div>
          ))}
        </div>
      </div>

      {/* Tab content */}
      <div style={{ flex:1, overflowY:'auto' }}>
        {tab === 'overview' && <OverviewTab member={member} totalBookings={totalBookings} totalSavings={totalSavings}/>}
        {tab === 'bookings' && <BookingsTab member={member}/>}
      </div>
    </div>
  );
}

function ActionBtn({ label, color, bg }) {
  return (
    <div style={{ height:28, padding:'0 10px', borderRadius:3, background:bg, border:`1px solid ${color}33`, display:'flex', alignItems:'center', fontSize:11, fontWeight:600, color, letterSpacing:0.8, textTransform:'uppercase', cursor:'pointer', userSelect:'none' }}>{label}</div>
  );
}

      {/* Quick stats */}
      <div style={{ display:'flex', gap:1, margin:'20px 0', borderRadius:4, overflow:'hidden', border:`1px solid ${PC.line}` }}>
        {[
          { label:'PC Tokens', value: fmt(member.tokens), sub:'balance' },
          { label:'Bookings',  value: totalBookings,      sub:'total'   },
          { label:'Saved',     value: `₹${fmt(totalSavings)}`, sub:'lifetime' },
        ].map((s,i) => (
          <div key={s.label} style={{ flex:1, padding:'14px 12px', background:PC.paper, borderRight: i < 2 ? `1px solid ${PC.line}` : 'none', textAlign:'center' }}>

            <div style={{ fontSize:9, letterSpacing:2, color:PC.mute, textTransform:'uppercase', marginTop:5 }}>{s.label}</div>

      {/* Contact */}
      <div style={{ fontSize:9.5, letterSpacing:2, color:PC.mute, textTransform:'uppercase', fontWeight:600, marginBottom:10 }}>Contact</div>
      <Hairline style={{ marginBottom:12 }}/>
      {[
        { icon:'M3 8l9-5 9 5v9a1 1 0 01-1 1H4a1 1 0 01-1-1V8z M9 21V12h6v9', label:'Email',  value:member.email },
        { icon:'M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z', label:'Phone',  value:member.phone },
        { icon:'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z M15 11a3 3 0 11-6 0 3 3 0 016 0z', label:'City',   value:member.city  },
        { icon:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z', label:'Joined', value:fmtDate(member.joined) },
      ].map(row => (
        <div key={row.label} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:10 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" style={{ marginTop:1, flexShrink:0 }}>
            <path d={row.icon} stroke={PC.mute} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <div>
            <div style={{ fontSize:9.5, color:PC.mute, letterSpacing:1.5, textTransform:'uppercase' }}>{row.label}</div>
            <div style={{ fontSize:13, color:PC.obsidian, marginTop:2 }}>{row.value}</div>
          </div>
        </div>
      ))}

      {/* Token history */}
      <div style={{ fontSize:9.5, letterSpacing:2, color:PC.mute, textTransform:'uppercase', fontWeight:600, margin:'20px 0 10px' }}>Token History</div>

      {member.tokenHistory.length === 0 ? (
        <div style={{ fontSize:12, color:PC.mute, textAlign:'center', padding:'16px 0' }}>No token activity yet.</div>

          <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom: i < member.tokenHistory.length-1 ? `1px solid ${PC.line}` : 'none', marginBottom: i < member.tokenHistory.length-1 ? 10 : 0 }}>
            <div>
              <div style={{ fontSize:12, color:PC.obsidian }}>{h.label}</div>
              <div style={{ fontSize:10, color:PC.mute, marginTop:2 }}>{fmtDate(h.date)}</div>

}

  const bookingStatusOrder = { upcoming:0, active:1, confirmed:2, cancelled:3 };
  const sorted = [...member.bookings].sort((a,b) => (bookingStatusOrder[a.status]??9) - (bookingStatusOrder[b.status]??9));
  return (
    <div style={{ padding:'16px 20px 24px' }}>
      {sorted.length === 0 ? (
        <div style={{ padding:'40px 0', textAlign:'center' }}>
          <div style={{ fontSize:32, fontFamily:SERIF, color:PC.line, marginBottom:8 }}>—</div>
          <div style={{ fontSize:13, color:PC.mute }}>No bookings yet.</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {sorted.map(b => (
            <div key={b.id} style={{ padding:'14px 16px', background:PC.paper, borderRadius:4, border:`1px solid ${PC.line}`, position:'relative' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:9, letterSpacing:2, color:PC.mute, textTransform:'uppercase' }}>{b.category}</div>
                  <div style={{ fontSize:13, fontWeight:600, color:PC.obsidian, marginTop:3, lineHeight:1.3 }}>{b.item}</div>
                </div>
                <BookingStatusBadge status={b.status}/>
              </div>
              <Hairline style={{ margin:'8px 0' }}/>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                <div>
                  <div style={{ fontSize:9, color:PC.mute, letterSpacing:1.5, textTransform:'uppercase' }}>Amount</div>
                  <div style={{ fontFamily:SERIF, fontSize:15, fontWeight:500, color:PC.obsidian, marginTop:2, fontVariantNumeric:'tabular-nums lining-nums' }}>{b.amount}</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:9, color:PC.goldDeep, letterSpacing:1.5, textTransform:'uppercase' }}>Saved</div>
                  <div style={{ fontFamily:SERIF, fontSize:15, fontWeight:500, color:PC.goldDeep, marginTop:2, fontVariantNumeric:'tabular-nums lining-nums' }}>{b.savings}</div>
                </div>
              </div>
              <div style={{ marginTop:8, fontSize:10, color:PC.mute }}>{fmtDate(b.date)} · {b.id}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── PLACEHOLDER FOR OTHER NAV SECTIONS ───────────────────────
function ComingSoon({ label }) {
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, background:PC.paper }}>
      <div style={{ fontFamily:SERIF, fontSize:42, color:PC.line }}>—</div>
      <div style={{ fontSize:13, color:PC.mute, letterSpacing:2, textTransform:'uppercase' }}>{label} · Coming Soon</div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────
function App() {
  const [activeNav,    setActiveNav]    = React.useState('members');
  const [query,        setQuery]        = React.useState('');
  const [tierFilter,   setTierFilter]   = React.useState('all');
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [selected,     setSelected]     = React.useState(null);
  const [sortBy,       setSortBy]       = React.useState('joined');
  const [sortDir,      setSortDir]      = React.useState('desc');

  const handleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('asc'); }
  };

  const filtered = React.useMemo(() => {
    const q = query.toLowerCase().trim();
    return MEMBERS
      .filter(m => {
        const matchQ = !q || m.name.toLowerCase().includes(q) || m.id.toLowerCase().includes(q) || m.email.toLowerCase().includes(q) || m.city.toLowerCase().includes(q);
        const matchT = tierFilter === 'all'   || m.tier   === tierFilter;
        const matchS = statusFilter === 'all' || m.status === statusFilter;
        return matchQ && matchT && matchS;
      })
      .sort((a, b) => {
        let va = a[sortBy], vb = b[sortBy];
        if (sortBy === 'tokens') { va = +va; vb = +vb; }
        if (sortBy === 'joined') { va = new Date(va); vb = new Date(vb); }
        const tierOrder = { obsidian:0, platinum:1, gold:2, silver:3 };
        if (sortBy === 'tier')   { va = tierOrder[va]??9; vb = tierOrder[vb]??9; }
        if (va < vb) return sortDir === 'asc' ? -1 :  1;
        if (va > vb) return sortDir === 'asc' ?  1 : -1;
        return 0;
      });
  }, [query, tierFilter, statusFilter, sortBy, sortDir]);

  // Keep selected member in sync if filters remove it
  React.useEffect(() => {
    if (selected && !filtered.find(m => m.id === selected.id)) setSelected(null);
  }, [filtered, selected]);

  return (
    <div style={{ display:'flex', height:'100vh', background:PC.paper }}>
      <Sidebar active={activeNav} onNav={id => { setActiveNav(id); setSelected(null); }}/>

      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:PC.paper }}>
        {activeNav === 'members' ? (
          <>
            <StatsBar members={MEMBERS}/>
            <SearchBar
              query={query} onQuery={setQuery}
              tierFilter={tierFilter} onTier={setTierFilter}
              statusFilter={statusFilter} onStatus={setStatusFilter}
            />
            <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
              <MembersTable
                members={filtered} selected={selected} onSelect={setSelected}
                sortBy={sortBy} sortDir={sortDir} onSort={handleSort}
              />
              {selected && <MemberDetail member={selected} onClose={() => setSelected(null)}/>}
            </div>
          </>
        ) : (
          <ComingSoon label={activeNav.charAt(0).toUpperCase() + activeNav.slice(1)}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
