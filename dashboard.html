<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlutusClub — Member Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A12; font-family: -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif; color: #F6F2E8; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #15151F; }
    ::-webkit-scrollbar-thumb { background: #8E7333; border-radius: 3px; }
    a { text-decoration: none; }
    button { cursor: pointer; border: none; outline: none; }
    input, textarea, select { outline: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const PC = {
  obsidian: '#0A0A12',
  ink: '#15151F',
  ink2: '#1F1F2B',
  gold: '#C9A961',
  goldHi: '#E2C77A',
  goldDeep: '#8E7333',
  cream: '#F6F2E8',
  paper: '#FBF8F1',
  mute: '#7A7787',
  muteDk: '#9A95A7',
  line: '#E8E2D2',
  lineDk: 'rgba(255,255,255,0.08)',
};
const SERIF = '"Cormorant Garamond", Georgia, serif';
const SANS = '-apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif';

const TIER_COLOR = {
  silver: '#8a9bac',
  gold: '#C9A961',
  platinum: '#b0c4d8',
  obsidian: '#C9A961',
};

const fmtINR = n => '₹' + n.toLocaleString('en-IN');

function PCLogo({ size = 28, color = PC.gold }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, fontFamily: SERIF }}>
      <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18.5" stroke={color} strokeWidth="1.2"/>
        <circle cx="20" cy="20" r="14" stroke={color} strokeWidth="0.5" strokeOpacity="0.5"/>
        <text x="20" y="27" textAnchor="middle" fontFamily={SERIF} fontSize="20" fontWeight="600" fill={color} letterSpacing="-1">P</text>
      </svg>
      <span style={{ fontSize: size * 0.72, fontWeight: 500, color: PC.cream, letterSpacing: 2.8, textTransform: 'uppercase', fontFamily: SANS }}>PlutusClub</span>
    </div>
  );
}

// Icons
function IconHome({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
  );
}
function IconTag({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
      <line x1="7" y1="7" x2="7.01" y2="7"/>
    </svg>
  );
}
function IconCalendar({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  );
}
function IconCoin({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 7v10M9.5 9.5C9.5 8.4 10.6 7 12 7s2.5 1.4 2.5 2.5c0 2.5-5 2.5-5 5 0 1.1 1.1 2.5 2.5 2.5s2.5-1.4 2.5-2.5"/>
    </svg>
  );
}
function IconUsers({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
    </svg>
  );
}
function IconHeadset({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 18v-6a9 9 0 0118 0v6"/>
      <path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3v5zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3v5z"/>
    </svg>
  );
}
function IconGear({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  );
}
function IconBell({ size = 20, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 01-3.46 0"/>
    </svg>
  );
}
function IconSearch({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  );
}
function IconDownload({ size = 20, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  );
}
function IconPhone({ size = 20, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
  );
}

// Stat Card
function StatCard({ label, value, subtitle, action }) {
  return (
    <div style={{
      background: PC.ink2,
      border: `1px solid ${PC.lineDk}`,
      borderRadius: 12,
      padding: 20,
      flex: 1,
      minWidth: 0,
    }}>
      <div style={{ fontSize: 11, fontFamily: SANS, color: PC.muteDk, letterSpacing: 1.2, textTransform: 'uppercase', marginBottom: 8 }}>{label}</div>
      <div style={{ fontSize: 28, fontFamily: SERIF, color: PC.cream, fontWeight: 600, lineHeight: 1.1 }}>{value}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4 }}>
        <span style={{ fontSize: 12, color: PC.muteDk, fontFamily: SANS }}>{subtitle}</span>
        {action && <button onClick={action.fn} style={{ fontSize: 12, color: PC.gold, background: 'none', border: 'none', cursor: 'pointer', fontFamily: SANS, padding: 0 }}>{action.label}</button>}
      </div>
    </div>
  );
}

// Deal Card
function DealCard({ name, category, clubPrice, retailPrice, savings }) {
  return (
    <div style={{
      background: PC.ink,
      border: `1px solid ${PC.lineDk}`,
      borderRadius: 12,
      overflow: 'hidden',
      flex: '1 1 0',
      minWidth: 0,
      display: 'flex',
      flexDirection: 'column',
    }}>
      <div style={{ padding: '14px 18px 0', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
        <span style={{
          background: 'rgba(201,169,97,0.15)',
          color: PC.gold,
          fontSize: 10,
          fontFamily: SANS,
          letterSpacing: 1.2,
          textTransform: 'uppercase',
          padding: '3px 8px',
          borderRadius: 4,
          border: `1px solid rgba(201,169,97,0.25)`,
        }}>Active</span>
        <span style={{ fontSize: 11, color: PC.muteDk, fontFamily: SANS }}>{category}</span>
      </div>
      <div style={{ padding: '12px 18px 18px', flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ fontSize: 18, fontFamily: SERIF, color: PC.cream, fontWeight: 600, lineHeight: 1.3 }}>{name}</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <span style={{ fontSize: 11, color: PC.muteDk, fontFamily: SANS }}>Club Price</span>
            <span style={{ fontSize: 18, fontFamily: SERIF, color: PC.cream, fontWeight: 600 }}>{clubPrice}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <span style={{ fontSize: 11, color: PC.muteDk, fontFamily: SANS }}>Retail</span>
            <span style={{ fontSize: 13, color: PC.muteDk, fontFamily: SANS, textDecoration: 'line-through' }}>{retailPrice}</span>
          </div>
        </div>
        <div style={{ borderTop: `1px solid ${PC.lineDk}`, paddingTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontSize: 10, color: PC.muteDk, fontFamily: SANS, letterSpacing: 0.8 }}>YOU SAVE</div>
            <div style={{ fontSize: 15, fontFamily: SERIF, color: PC.gold, fontWeight: 700 }}>{savings}</div>
          </div>
          <button style={{
            background: PC.gold,
            color: PC.obsidian,
            border: 'none',
            borderRadius: 6,
            padding: '8px 16px',
            fontSize: 12,
            fontWeight: 600,
            fontFamily: SANS,
            cursor: 'pointer',
            letterSpacing: 0.4,
          }}>Book Deal</button>
        </div>
      </div>
    </div>
  );
}

// Booking Row
function BookingRow({ name, bookingId, status, detail, action }) {
  const statusConfig = {
    confirmed: { color: '#34d399', bg: 'rgba(52,211,153,0.1)', label: 'Confirmed' },
    processing: { color: '#fbbf24', bg: 'rgba(251,191,36,0.1)', label: 'Processing' },
    pending: { color: '#f87171', bg: 'rgba(248,113,113,0.1)', label: 'Pending Payment' },
  };
  const s = statusConfig[status];
  return (
    <div style={{
      display: 'flex',
      alignItems: 'center',
      padding: '14px 18px',
      background: PC.ink2,
      borderRadius: 8,
      gap: 12,
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, color: PC.cream, fontFamily: SANS, fontWeight: 500 }}>{name}</div>
        <div style={{ fontSize: 11, color: PC.muteDk, fontFamily: SANS, marginTop: 2 }}>{bookingId}</div>
      </div>
      <div style={{ fontSize: 12, color: PC.muteDk, fontFamily: SANS, textAlign: 'right', minWidth: 120 }}>{detail}</div>
      <div style={{ minWidth: 110, textAlign: 'right' }}>
        <span style={{
          background: s.bg,
          color: s.color,
          fontSize: 11,
          padding: '3px 10px',
          borderRadius: 20,
          fontFamily: SANS,
          fontWeight: 500,
        }}>{s.label}</span>
      </div>
      <div style={{ minWidth: 80, textAlign: 'right' }}>
        {action ? (
          <button style={{
            background: PC.gold,
            color: PC.obsidian,
            border: 'none',
            borderRadius: 5,
            padding: '5px 12px',
            fontSize: 12,
            fontWeight: 600,
            fontFamily: SANS,
            cursor: 'pointer',
          }}>Pay Now</button>
        ) : <span style={{ fontSize: 11, color: PC.mute, fontFamily: SANS }}>—</span>}
      </div>
    </div>
  );
}

// Token Activity Row
function TokenRow({ amount, desc, date, positive }) {
  return (
    <div style={{
      display: 'flex',
      alignItems: 'center',
      padding: '12px 0',
      borderBottom: `1px solid ${PC.lineDk}`,
      gap: 12,
    }}>
      <div style={{
        width: 32,
        height: 32,
        borderRadius: '50%',
        background: positive ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        flexShrink: 0,
        fontSize: 14,
        color: positive ? '#34d399' : '#f87171',
        fontWeight: 700,
      }}>{positive ? '+' : '−'}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, color: PC.cream, fontFamily: SANS }}>{desc}</div>
        <div style={{ fontSize: 11, color: PC.mute, fontFamily: SANS, marginTop: 2 }}>{date}</div>
      </div>
      <div style={{ fontSize: 14, fontFamily: SERIF, fontWeight: 600, color: positive ? '#34d399' : '#f87171' }}>
        {positive ? '+' : '−'}{Math.abs(amount)} PC
      </div>
    </div>
  );
}

// Quick Action Card
function QuickAction({ icon, label, onClick }) {
  const [hovered, setHovered] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: hovered ? '#252533' : PC.ink2,
        border: `1px solid ${hovered ? PC.goldDeep : PC.lineDk}`,
        borderRadius: 12,
        padding: '20px 16px',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: 10,
        flex: 1,
        cursor: 'pointer',
        transition: 'all 0.18s ease',
      }}>
      <div style={{ color: hovered ? PC.gold : PC.muteDk }}>{icon}</div>
      <span style={{ fontSize: 12, color: hovered ? PC.cream : PC.muteDk, fontFamily: SANS, textAlign: 'center', lineHeight: 1.3 }}>{label}</span>
    </button>
  );
}

// Deals View
function DealsView({ setActiveView }) {
  return (

      zIndex: 10,
    }}>
      <PCLogo size={26}/>
      <div style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
        <div style={{ position: 'relative', width: '100%', maxWidth: 420 }}>
          <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: PC.muteDk }}>
            <IconSearch/>
          </div>
          <input
            type="text"
            placeholder="Search deals, categories, brands..."
            style={{
              width: '100%',
              background: PC.ink2,
              border: `1px solid ${PC.lineDk}`,
              borderRadius: 20,
              padding: '8px 16px 8px 36px',
              color: PC.cream,
              fontFamily: SANS,
              fontSize: 13,
            }}
          />
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setShowNotif(v => !v)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: PC.muteDk, display: 'flex', padding: 4 }}>
            <IconBell/>
          </button>
          <span style={{ position: 'absolute', top: 0, right: 0, width: 16, height: 16, background: PC.gold, borderRadius: '50%', fontSize: 9, color: PC.obsidian, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontFamily: SANS }}>3</span>
          {showNotif && (
            <div style={{ position: 'absolute', right: 0, top: 40, width: 300, background: PC.ink, border: `1px solid ${PC.lineDk}`, borderRadius: 12, boxShadow: '0 16px 40px rgba(0,0,0,0.5)', zIndex: 100 }}>
              <div style={{ padding: '14px 18px', borderBottom: `1px solid ${PC.lineDk}`, fontSize: 13, color: PC.cream, fontFamily: SANS, fontWeight: 500 }}>Notifications</div>
              {[
                { text: 'Your Manali booking payment is due.', time: '2h ago', dot: '#f87171' },
                { text: 'New deal: Royal Enfield Meteor 350 — save ₹12,000', time: '1d ago', dot: PC.gold },
                { text: '240 PC Tokens credited for LG Washing Machine.', time: '3d ago', dot: '#34d399' },
              ].map((n, i) => (
                <div key={i} style={{ padding: '12px 18px', borderBottom: i < 2 ? `1px solid ${PC.lineDk}` : 'none', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                  <div style={{ width: 7, height: 7, borderRadius: '50%', background: n.dot, marginTop: 5, flexShrink: 0 }}/>
                  <div>
                    <div style={{ fontSize: 12, color: PC.cream, fontFamily: SANS, lineHeight: 1.5 }}>{n.text}</div>
                    <div style={{ fontSize: 10, color: PC.mute, fontFamily: SANS, marginTop: 2 }}>{n.time}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'rgba(201,169,97,0.15)', border: `1.5px solid ${PC.goldDeep}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: PC.gold, fontFamily: SANS, cursor: 'pointer' }}>
          AM
        </div>
      </div>
    </div>
  );
}

// App
function App() {
  const [activeView, setActiveView] = useState('dashboard');
  const [showNotif, setShowNotif] = useState(false);

  const renderView = () => {
    switch (activeView) {
      case 'dashboard': return <DashboardView setActiveView={setActiveView}/>;
      case 'deals': return <DealsView setActiveView={setActiveView}/>;
      case 'bookings': return <BookingsView setActiveView={setActiveView}/>;
      case 'wallet': return <WalletView setActiveView={setActiveView}/>;
      case 'referrals': return <ReferralsView setActiveView={setActiveView}/>;
      case 'concierge': return <ConciergeView setActiveView={setActiveView}/>;
      case 'settings': return <SettingsView setActiveView={setActiveView}/>;
      default: return <DashboardView setActiveView={setActiveView}/>;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }} onClick={() => showNotif && setShowNotif(false)}>
      <TopBar showNotif={showNotif} setShowNotif={setShowNotif}/>
      <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
        <Sidebar activeView={activeView} setActiveView={setActiveView}/>
        <main style={{ flex: 1, overflowY: 'auto', background: PC.obsidian }}>
          {renderView()}
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
